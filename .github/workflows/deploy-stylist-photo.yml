# スタイリストフォト → Xserver(fashion-stylist.co.jp/closet/photo/) 自動デプロイ
#
# 必要な GitHub Secrets:
#   FSJ_FTP_HOST       … FTPホスト
#   FSJ_FTP_USERNAME   … FTPユーザー名
#   FSJ_FTP_PASSWORD   … FTPパスワード
#   FSJ_PHOTO_FTP_REMOTE … リモートパス（例: /fashion-stylist.co.jp/public_html/closet/photo/）

name: deploy-stylist-photo

on:
  push:
    branches: [main]
    paths:
      - 'projects/stylist-photo/site/**'
      - '.github/workflows/deploy-stylist-photo.yml'
  workflow_dispatch:

concurrency:
  group: deploy-stylist-photo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: FTP で Xserver へデプロイ
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FSJ_FTP_HOST }}
          username: ${{ secrets.FSJ_FTP_USERNAME }}
          password: ${{ secrets.FSJ_FTP_PASSWORD }}
          local-dir: ./projects/stylist-photo/site/
          server-dir: ${{ secrets.FSJ_PHOTO_FTP_REMOTE }}
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
            .DS_Store
            *.md
            *.bak
            *.example.*
